{% extends "layout.html" %}

{% block title %}My Profile | TrekTrail{% endblock %}

{% block content %}
<div class="container py-4 py-lg-5">
    <div class="row justify-content-center"><div class="col-xl-8">
        <div class="mb-4"><p class="text-success fw-semibold small mb-1">ACCOUNT SETTINGS</p><h1 class="h2 fw-bold mb-1">My profile</h1><p class="text-secondary mb-0">Keep your personal and login details up to date.</p></div>
        <div class="card dashboard-card shadow-sm"><div class="card-body p-4 p-lg-5">
            <div class="d-flex align-items-center gap-3 pb-4 mb-4 border-bottom"><div class="brand-mark m-0 flex-shrink-0">{{ user.name[:1]|upper }}</div><div><h2 class="h5 fw-bold mb-1">{{ user.name }}</h2><p class="text-secondary mb-0">{{ user.email }}</p></div></div>
            <form method="post" action="{{ url_for('user.profile') }}">
                <div class="row g-4">
                    <div class="col-md-6"><label class="form-label" for="fullName">Full name</label><input class="form-control" id="fullName" name="fullName" value="{{ user.name }}" autocomplete="name" required></div>
                    <div class="col-md-6"><label class="form-label" for="email">Email address</label><input class="form-control" id="email" name="email" type="email" value="{{ user.email }}" autocomplete="email" required></div>
                    <div class="col-12"><label class="form-label" for="password">New password <span class="text-secondary fw-normal">(optional)</span></label><input class="form-control" id="password" name="password" type="password" minlength="6" autocomplete="new-password" placeholder="Leave blank to keep your current password"><div class="form-text">Use at least 6 characters.</div></div>
                    <div class="col-12 d-flex flex-wrap gap-2 pt-2"><button class="btn btn-success px-4" type="submit"><i class="bi bi-check2-circle me-2"></i>Save changes</button><a class="btn btn-outline-secondary" href="{{ url_for('user.dashboard') }}">Cancel</a></div>
                </div>
            </form>
        </div></div>
    </div></div>
</div>
{% endblock %}
